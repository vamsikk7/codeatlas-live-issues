<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 310" font-family="Inter, system-ui, sans-serif">
  <rect width="700" height="310" rx="16" fill="#0d1117"/>
  <text x="20" y="28" font-size="14" font-weight="700" fill="#484f58">L2b Feature Detail</text>

  <!-- Header -->
  <rect x="20" y="40" width="660" height="36" rx="8" fill="#161b22"/>
  <rect x="30" y="48" width="75" height="20" rx="4" fill="#7aa2f7"/><text x="67" y="62" text-anchor="middle" font-size="9" font-weight="700" fill="#0d1117">Feature Detail</text>
  <text x="115" y="63" font-size="12" font-weight="700" fill="#c9d1d9">Auth</text>
  <text x="310" y="63" font-size="9" fill="#8b949e">Service: backend &#183; 3 APIs &#183; 3 files</text>

  <!-- Filter bar -->
  <rect x="20" y="82" width="660" height="32" rx="6" fill="#1a1e28"/>
  <rect x="28" y="88" width="200" height="20" rx="4" fill="#0d1117" stroke="#484f58" stroke-width="1"/>
  <text x="38" y="102" font-size="9" fill="#484f58">Filter by route or handler... (/)</text>
  <rect x="240" y="88" width="36" height="20" rx="4" fill="#7aa2f7"/><text x="258" y="102" text-anchor="middle" font-size="9" font-weight="700" fill="#0d1117">ALL</text>
  <rect x="280" y="88" width="36" height="20" rx="4" fill="transparent" stroke="#484f58" stroke-width="1"/><text x="298" y="102" text-anchor="middle" font-size="9" fill="#8b949e">GET</text>
  <rect x="320" y="88" width="40" height="20" rx="4" fill="transparent" stroke="#484f58" stroke-width="1"/><text x="340" y="102" text-anchor="middle" font-size="9" fill="#8b949e">POST</text>

  <!-- API rows -->
  <rect x="20" y="120" width="660" height="28" rx="4" fill="#161b22"/>
  <rect x="28" y="126" width="40" height="16" rx="3" fill="#7aa2f7"/><text x="48" y="138" text-anchor="middle" font-size="8" font-weight="700" fill="#0d1117">POST</text>
  <text x="78" y="138" font-size="11" fill="#c9d1d9">/api/auth/register</text>
  <text x="580" y="138" font-size="10" fill="#8b949e">register</text>

  <rect x="20" y="152" width="660" height="28" rx="4" fill="#1a1e28"/>
  <rect x="28" y="158" width="40" height="16" rx="3" fill="#7aa2f7"/><text x="48" y="170" text-anchor="middle" font-size="8" font-weight="700" fill="#0d1117">POST</text>
  <text x="78" y="170" font-size="11" fill="#c9d1d9">/api/auth/login</text>
  <text x="580" y="170" font-size="10" fill="#8b949e">login</text>

  <rect x="20" y="184" width="660" height="28" rx="4" fill="#161b22"/>
  <rect x="28" y="190" width="34" height="16" rx="3" fill="#4ec9b0"/><text x="45" y="202" text-anchor="middle" font-size="8" font-weight="700" fill="#0d1117">GET</text>
  <text x="72" y="202" font-size="11" fill="#c9d1d9">/api/auth/me</text>
  <text x="580" y="202" font-size="10" fill="#8b949e">getCurrentUser</text>

  <!-- Mobile sections -->
  <rect x="20" y="222" width="660" height="24" rx="4" fill="#161b22" stroke="#7aa2f7" stroke-width="1" stroke-opacity="0.3"/>
  <text x="36" y="238" font-size="10" fill="#7aa2f7">&#x25BC; Screens / Pages</text>
  <text x="640" y="238" font-size="9" fill="#8b949e">(2)</text>

  <rect x="20" y="250" width="660" height="24" rx="4" fill="#161b22" stroke="#73daca" stroke-width="1" stroke-opacity="0.3"/>
  <text x="36" y="266" font-size="10" fill="#73daca">&#x25B6; Navigation Routes</text>
  <text x="640" y="266" font-size="9" fill="#8b949e">(3)</text>

  <rect x="20" y="278" width="660" height="24" rx="4" fill="#161b22" stroke="#ff9e64" stroke-width="1" stroke-opacity="0.3"/>
  <text x="36" y="294" font-size="10" fill="#ff9e64">&#x25B6; Network Calls</text>
  <text x="640" y="294" font-size="9" fill="#8b949e">(1)</text>
</svg>
