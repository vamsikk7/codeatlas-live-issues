<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#484f58"/></marker>
    <linearGradient id="glow-blue" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7aa2f7" stop-opacity="0.15"/><stop offset="100%" stop-color="#7aa2f7" stop-opacity="0"/></linearGradient>
    <linearGradient id="glow-teal" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#73daca" stop-opacity="0.15"/><stop offset="100%" stop-color="#73daca" stop-opacity="0"/></linearGradient>
  </defs>
  <rect width="700" height="340" rx="16" fill="#0d1117"/>
  <text x="20" y="28" font-size="14" font-weight="700" fill="#484f58">L1 System Design</text>

  <!-- Backend glow + box -->
  <rect x="55" y="55" width="210" height="110" rx="18" fill="url(#glow-blue)"/>
  <rect x="60" y="60" width="200" height="100" rx="14" ry="14" fill="#161b2e" stroke="#7aa2f7" stroke-width="2.5"/>
  <text x="160" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#c9d1d9">backend</text>
  <text x="160" y="110" text-anchor="middle" font-size="10" fill="#7aa2f7">Express + Python</text>
  <text x="160" y="126" text-anchor="middle" font-size="9" fill="#8b949e">11 APIs</text>
  <text x="160" y="148" text-anchor="middle" font-size="9" fill="#484f58" font-style="italic">Explore features &#8594;</text>

  <!-- Frontend glow + box -->
  <rect x="415" y="55" width="210" height="110" rx="18" fill="url(#glow-teal)"/>
  <rect x="420" y="60" width="200" height="100" rx="14" ry="14" fill="#161b2e" stroke="#73daca" stroke-width="2.5"/>
  <text x="520" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#c9d1d9">frontend</text>
  <text x="520" y="110" text-anchor="middle" font-size="10" fill="#73daca">Next.js</text>
  <text x="520" y="148" text-anchor="middle" font-size="9" fill="#484f58" font-style="italic">Explore features &#8594;</text>

  <!-- Edge: frontend -> backend -->
  <line x1="420" y1="110" x2="265" y2="110" stroke="#484f58" stroke-width="2" marker-end="url(#ah)"/>
  <rect x="310" y="96" width="60" height="16" rx="4" fill="#161b22"/>
  <text x="340" y="108" text-anchor="middle" font-size="9" fill="#8b949e">fetch /api</text>

  <!-- MongoDB -->
  <rect x="40" y="225" width="140" height="75" rx="10" ry="10" fill="#1a1520" stroke="#bb9af7" stroke-width="2"/>
  <text x="110" y="254" text-anchor="middle" font-size="12" font-weight="600" fill="#c9d1d9">MongoDB</text>
  <rect x="68" y="264" width="84" height="16" rx="4" fill="#261e30"/>
  <text x="110" y="276" text-anchor="middle" font-size="9" fill="#bb9af7">database</text>

  <!-- Redis -->
  <rect x="220" y="225" width="140" height="75" rx="10" ry="10" fill="#1a2018" stroke="#9ece6a" stroke-width="2"/>
  <text x="290" y="254" text-anchor="middle" font-size="12" font-weight="600" fill="#c9d1d9">Redis</text>
  <rect x="256" y="264" width="68" height="16" rx="4" fill="#1e2818"/>
  <text x="290" y="276" text-anchor="middle" font-size="9" fill="#9ece6a">cache</text>

  <!-- Kafka -->
  <rect x="400" y="225" width="140" height="75" rx="10" ry="10" fill="#201a18" stroke="#ff9e64" stroke-width="2"/>
  <text x="470" y="254" text-anchor="middle" font-size="12" font-weight="600" fill="#c9d1d9">Kafka</text>
  <rect x="436" y="264" width="68" height="16" rx="4" fill="#2e2018"/>
  <text x="470" y="276" text-anchor="middle" font-size="9" fill="#ff9e64">queue</text>

  <!-- Infra edges (dashed) -->
  <line x1="110" y1="165" x2="110" y2="220" stroke="#3b3f4a" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#ah)"/>
  <line x1="210" y1="160" x2="260" y2="220" stroke="#3b3f4a" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#ah)"/>
  <line x1="520" y1="165" x2="500" y2="220" stroke="#3b3f4a" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#ah)"/>

  <!-- Stripe (external) -->
  <rect x="570" y="225" width="110" height="75" rx="10" ry="10" fill="#18181a" stroke="#484f58" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="625" y="254" text-anchor="middle" font-size="11" font-weight="600" fill="#8b949e">stripe.com</text>
  <rect x="583" y="264" width="84" height="16" rx="4" fill="#1e1e20"/>
  <text x="625" y="276" text-anchor="middle" font-size="9" fill="#484f58">external</text>
  <line x1="560" y1="160" x2="600" y2="220" stroke="#3b3f4a" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ah)"/>
</svg>
