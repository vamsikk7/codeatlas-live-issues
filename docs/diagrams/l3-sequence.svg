<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="a3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#bb9af7"/></marker>
    <marker id="a3r" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto"><polygon points="8 0, 0 3, 8 6" fill="#484f58"/></marker>
  </defs>
  <rect width="700" height="320" rx="16" fill="#0d1117"/>
  <text x="20" y="28" font-size="14" font-weight="700" fill="#484f58">L3 Sequence: POST /api/auth/login</text>

  <!-- Participant headers -->
  <rect x="40" y="50" width="110" height="36" rx="8" fill="#1a1e2e" stroke="#7aa2f7" stroke-width="2"/>
  <text x="95" y="73" text-anchor="middle" font-size="11" font-weight="700" fill="#c9d1d9">API Client</text>

  <rect x="200" y="50" width="130" height="36" rx="8" fill="#1a1e2e" stroke="#bb9af7" stroke-width="2"/>
  <text x="265" y="66" text-anchor="middle" font-size="10" font-weight="700" fill="#c9d1d9">authController</text>
  <text x="265" y="80" text-anchor="middle" font-size="8" fill="#8b949e">authController.js</text>

  <rect x="380" y="50" width="120" height="36" rx="8" fill="#1a1e2e" stroke="#bb9af7" stroke-width="2"/>
  <text x="440" y="66" text-anchor="middle" font-size="10" font-weight="700" fill="#c9d1d9">userModel</text>
  <text x="440" y="80" text-anchor="middle" font-size="8" fill="#8b949e">userModel.js</text>

  <rect x="550" y="50" width="120" height="36" rx="8" fill="#1a1520" stroke="#bb9af7" stroke-width="2"/>
  <text x="610" y="66" text-anchor="middle" font-size="10" font-weight="700" fill="#c9d1d9">MongoDB</text>
  <text x="610" y="80" text-anchor="middle" font-size="8" fill="#8b949e">database</text>

  <!-- Lifelines -->
  <line x1="95" y1="90" x2="95" y2="290" stroke="#484f58" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="265" y1="90" x2="265" y2="290" stroke="#484f58" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="440" y1="90" x2="440" y2="290" stroke="#484f58" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="610" y1="90" x2="610" y2="290" stroke="#484f58" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Message 1: Client -> authController -->
  <line x1="95" y1="120" x2="258" y2="120" stroke="#bb9af7" stroke-width="1.5" marker-end="url(#a3)"/>
  <rect x="120" y="106" width="100" height="16" rx="3" fill="#1a1520"/>
  <text x="170" y="118" text-anchor="middle" font-size="9" font-weight="600" fill="#bb9af7">POST /login</text>

  <!-- Message 2: authController -> userModel -->
  <line x1="265" y1="155" x2="433" y2="155" stroke="#bb9af7" stroke-width="1.5" marker-end="url(#a3)"/>
  <rect x="310" y="141" width="75" height="16" rx="3" fill="#1a1520"/>
  <text x="347" y="153" text-anchor="middle" font-size="9" font-weight="600" fill="#bb9af7">findOne()</text>

  <!-- Message 3: userModel -> MongoDB -->
  <line x1="440" y1="185" x2="603" y2="185" stroke="#bb9af7" stroke-width="1.5" marker-end="url(#a3)"/>
  <rect x="485" y="171" width="60" height="16" rx="3" fill="#1a1520"/>
  <text x="515" y="183" text-anchor="middle" font-size="9" font-weight="600" fill="#bb9af7">query</text>

  <!-- Return 3: MongoDB -> userModel -->
  <line x1="603" y1="210" x2="447" y2="210" stroke="#484f58" stroke-width="1" stroke-dasharray="6,4" marker-end="url(#a3r)"/>
  <rect x="490" y="198" width="55" height="14" rx="3" fill="#161b22"/>
  <text x="517" y="209" text-anchor="middle" font-size="8" fill="#8b949e">result</text>

  <!-- Return 2: userModel -> authController -->
  <line x1="433" y1="240" x2="272" y2="240" stroke="#484f58" stroke-width="1" stroke-dasharray="6,4" marker-end="url(#a3r)"/>
  <rect x="320" y="228" width="50" height="14" rx="3" fill="#161b22"/>
  <text x="345" y="239" text-anchor="middle" font-size="8" fill="#8b949e">user</text>

  <!-- Return 1: authController -> Client -->
  <line x1="258" y1="270" x2="102" y2="270" stroke="#484f58" stroke-width="1" stroke-dasharray="6,4" marker-end="url(#a3r)"/>
  <rect x="140" y="258" width="55" height="14" rx="3" fill="#161b22"/>
  <text x="167" y="269" text-anchor="middle" font-size="8" fill="#8b949e">token</text>

  <!-- Legend -->
  <rect x="20" y="296" width="660" height="18" rx="6" fill="#161b22"/>
  <text x="35" y="309" font-size="9" fill="#8b949e">Participants: classes/files &#183; Messages: function calls &#183; Returns: dashed &#183; Cross-file resolution up to 8 hops</text>
</svg>
