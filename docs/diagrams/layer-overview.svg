<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 120" font-family="Inter, system-ui, sans-serif">
  <rect width="900" height="120" rx="16" fill="#0d1117"/>
  <!-- L1 -->
  <rect x="15" y="20" width="120" height="80" rx="12" ry="12" fill="#1a1e2e" stroke="#7aa2f7" stroke-width="2.5"/>
  <text x="75" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#c9d1d9">L1 System</text>
  <text x="75" y="63" text-anchor="middle" font-size="9" fill="#8b949e">Services + Infra</text>
  <text x="75" y="77" text-anchor="middle" font-size="9" fill="#8b949e">Databases, Queues</text>
  <polygon points="140,60 152,55 152,65" fill="#484f58"/>
  <!-- L2a -->
  <rect x="160" y="20" width="120" height="80" rx="12" ry="12" fill="#1a2e1e" stroke="#73daca" stroke-width="2.5"/>
  <text x="220" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#c9d1d9">L2a Features</text>
  <text x="220" y="63" text-anchor="middle" font-size="9" fill="#8b949e">Louvain Clusters</text>
  <text x="220" y="77" text-anchor="middle" font-size="9" fill="#8b949e">Cohesion Metrics</text>
  <polygon points="285,60 297,55 297,65" fill="#484f58"/>
  <!-- L2b -->
  <rect x="305" y="20" width="120" height="80" rx="12" ry="12" fill="#2e2a1a" stroke="#e0af68" stroke-width="2.5"/>
  <text x="365" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#c9d1d9">L2b API List</text>
  <text x="365" y="63" text-anchor="middle" font-size="9" fill="#8b949e">Endpoints, Screens</text>
  <text x="365" y="77" text-anchor="middle" font-size="9" fill="#8b949e">Nav, Network, DI</text>
  <polygon points="430,60 442,55 442,65" fill="#484f58"/>
  <!-- L3 -->
  <rect x="450" y="20" width="120" height="80" rx="12" ry="12" fill="#2e1a2e" stroke="#bb9af7" stroke-width="2.5"/>
  <text x="510" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#c9d1d9">L3 Sequence</text>
  <text x="510" y="63" text-anchor="middle" font-size="9" fill="#8b949e">Participants</text>
  <text x="510" y="77" text-anchor="middle" font-size="9" fill="#8b949e">Message Flow</text>
  <polygon points="575,60 587,55 587,65" fill="#484f58"/>
  <!-- L4 -->
  <rect x="595" y="20" width="120" height="80" rx="12" ry="12" fill="#1a2e2e" stroke="#7dcfff" stroke-width="2.5"/>
  <text x="655" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#c9d1d9">L4 File</text>
  <text x="655" y="63" text-anchor="middle" font-size="9" fill="#8b949e">Classes, Functions</text>
  <text x="655" y="77" text-anchor="middle" font-size="9" fill="#8b949e">Imports, Variables</text>
  <polygon points="720,60 732,55 732,65" fill="#484f58"/>
  <!-- L5 -->
  <rect x="740" y="20" width="140" height="80" rx="12" ry="12" fill="#2e1e1a" stroke="#ff9e64" stroke-width="2.5"/>
  <text x="810" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#c9d1d9">L5 Flow</text>
  <text x="810" y="63" text-anchor="middle" font-size="9" fill="#8b949e">If/Else, Loops</text>
  <text x="810" y="77" text-anchor="middle" font-size="9" fill="#8b949e">Try/Catch/Finally</text>
</svg>
